    document.getElementById("zoom-in").onclick = () => { pxPerBeat = Math.min(MAX_PPB, pxPerBeat * 1.25); clampScroll(); requestDraw(); };
    document.getElementById("zoom-out").onclick = () => { pxPerBeat = Math.max(MIN_PPB, pxPerBeat / 1.25); clampScroll(); requestDraw(); };

    // Tool buttons
    const toolButtons = {
      mouse: document.getElementById("tool-mouse"),
      pencil: document.getElementById("tool-pencil"),
      cut: document.getElementById("tool-cut"),
    };
    // Razor cursor for the Cut tool — blade tip = hotspot (bottom-left).
    const CUT_CURSOR = 'url("data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">'
      + '<path d="M2 20 L12 10 l2.5 2.5 L6.5 21 q-3 1.4 -4.5 -1 Z" fill="#e0e0e0" stroke="#141414" stroke-width="1"/>'
      + '<path d="M12.7 9.3 L17.5 4.5 a2.1 2.1 0 0 1 3 3 L15.2 11.8 Z" fill="#8c8c8c" stroke="#141414" stroke-width="1"/>'
      + '</svg>') + '") 2 20, crosshair';
    function toolCursor(t) {
      return t === "pencil" ? "crosshair" : (t === "cut" ? CUT_CURSOR : "default");
    }
    function setTool(t) {
      tool = t;
      for (const [name, btn] of Object.entries(toolButtons)) btn.classList.toggle("active", name === t);
      canvas.style.cursor = toolCursor(t);
      requestDraw();
    }
    toolButtons.mouse.onclick = () => setTool("mouse");
    toolButtons.pencil.onclick = () => setTool("pencil");
    toolButtons.cut.onclick = () => setTool("cut");

    // Articulation Selector Mode toggle
    const selectorToggle = document.getElementById("selector-toggle");
    selectorToggle.onclick = () => {
      selectorMode = !selectorMode;
      selectorToggle.classList.toggle("toggled", selectorMode);
      selectorToggle.textContent = "Art. select: " + (selectorMode ? "on" : "off");
    };

    // Snap-to-Scale toggle. Disabled (and labelled) when the host couldn't read
    // a scale; otherwise the title surfaces the scale name.
    const scaleToggle = document.getElementById("scale-toggle");
    if (!SCALE) {
      scaleToggle.disabled = true;
      scaleToggle.textContent = "Scale: n/a";
      scaleToggle.title = "Snap to Scale unavailable — Live didn't report a scale for this song.";
    } else {
      if (SCALE.name) scaleToggle.title += " (" + SCALE.name + ")";
      scaleToggle.onclick = () => {
        scaleOn = !scaleOn;
        scaleToggle.classList.toggle("toggled", scaleOn);
        scaleToggle.textContent = "Scale: " + (scaleOn ? "on" : "off");
      };
    }

    document.getElementById("play-btn").onclick = togglePlayback;

    // Cancel = close, KEEP live-applied writes (undo them via Live's own Cmd+Z).
    // Flush so the last edit within the debounce window isn't lost.
    document.getElementById("cancel-btn").onclick = () => { stopPlayback(); flushLiveApply(); closeWith({ type: "cancel" }); };
    document.getElementById("apply-btn").onclick = () => {
      stopPlayback();
      closeWith({ type: "apply", notes: serializeNotes() });
    };

    // ---- Map editor ----
    document.getElementById("edit-map").onclick = openMapEditor;
    document.getElementById("map-cancel").onclick = closeMapEditor;
    document.getElementById("map-add").onclick = () => {
      const maxPitch = artMap.reduce((m, a) => Math.max(m, a.pitch ?? 0), -1);
      artMap.push({ name: "New", pitch: Math.min(127, maxPitch + 1) });
      renderMapRows();
    };
    document.getElementById("map-save").onclick = () => closeWith({ type: "save-map", map: artMap });

    function openMapEditor() { renderMapRows(); mapOverlay.classList.add("show"); }
    function closeMapEditor() { mapOverlay.classList.remove("show"); }
    function renderMapRows() {
      const tbody = document.getElementById("map-rows");
      tbody.innerHTML = "";
      artMap.forEach((a, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML =
          '<td><input class="alx-input" data-i="' + i + '" data-k="name" value="' + (a.name ?? "") + '" /></td>' +
          '<td><input class="alx-input pitch" type="number" min="0" max="127" data-i="' + i + '" data-k="pitch" value="' + (a.pitch ?? 0) + '" /></td>' +
          '<td class="pname">' + pitchName(a.pitch) + '</td>' +
          '<td><input type="checkbox" data-i="' + i + '" data-k="hold" ' + (a.hold ? "checked" : "") + ' /></td>' +
          '<td><button class="alx-button small" data-del="' + i + '">✕</button></td>';
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll("input").forEach(el => {
        el.addEventListener("input", onMapEdit);
        el.addEventListener("change", onMapEdit);
      });
      tbody.querySelectorAll("button[data-del]").forEach(b => {
        b.onclick = () => { artMap.splice(+b.dataset.del, 1); renderMapRows(); };
      });
    }
    function onMapEdit(e) {
      const i = +e.target.dataset.i, k = e.target.dataset.k;
      if (k === "pitch") {
        artMap[i].pitch = Math.max(0, Math.min(127, +e.target.value || 0));
        e.target.closest("tr").querySelector(".pname").textContent = pitchName(artMap[i].pitch);
      } else if (k === "hold") {
        artMap[i].hold = e.target.checked;
      } else {
        artMap[i].name = e.target.value;
      }
    }

    // ---- Legend + status bar (Wave C) ----
    // currentArt only affects NEW notes/brushes — route every write through here
    // so the dropdown, legend highlight, and status line stay in sync.
    function setCurrentArt(name) {
      currentArt = name;
      if (artSelect && name != null) artSelect.value = name;
      renderLegend();
    }
    const GRID_LABELS = { "4": "1/1", "2": "1/2", "1": "1/4", "0.5": "1/8", "0.25": "1/16", "0.125": "1/32", "0": "Off" };
    const gridLabel = () => GRID_LABELS[String(snap)] ?? String(snap);

    function renderLegend() {
      const host = document.getElementById("legend-chips");
      if (!host) return;
      host.innerHTML = "";
      if (!artMap.length) {
        const e = document.createElement("span");
        e.className = "legend-empty";
        e.textContent = "No articulations — Edit map… to add some";
        host.appendChild(e);
        return;
      }
      artMap.forEach((a, i) => {
        const chip = document.createElement("div");
        chip.className = "legend-chip" + (a.name === currentArt ? " current" : "");
        chip.title = "Select all “" + a.name + "” notes (key " + (i + 1) + ")";
        const num = document.createElement("span"); num.className = "num"; num.textContent = String(i + 1);
        const sw = document.createElement("span"); sw.className = "swatch"; sw.style.background = artColor(a.name);
        const nm = document.createElement("span"); nm.textContent = a.name;
        chip.append(num, sw, nm);
        // keep canvas focus (don't steal it on mousedown), select-by-art on click
        chip.addEventListener("mousedown", ev => ev.preventDefault());
        chip.addEventListener("click", () => {
          selection = new Set(notes.filter(n => n.art === a.name).map(n => n._key));
          setCurrentArt(a.name);
          requestDraw();
        });
        host.appendChild(chip);
      });
    }

    let lastStatus = "";
    function renderStatus() {
      const el = document.getElementById("legend-status");
      if (!el) return;
      const s = selection.size + " selected · grid " + gridLabel() + " · art: " + (currentArt ?? "—");
      if (s !== lastStatus) { el.textContent = s; lastStatus = s; }
    }

    // ---- Init ----
    function init() {
      fillArtSelect();
      renderLegend();
      snapSelect.value = String(snap);
      setTool("mouse");
      resize();
      // fit clip to width
      pxPerBeat = Math.max(MIN_PPB, Math.min(MAX_PPB, gridW() / clipDuration));
      // center vertical scroll around the notes (or middle C area)
      const pitches = notes.map(n => n.pitch);
      const center = pitches.length ? Math.round(pitches.reduce((a, b) => a + b, 0) / pitches.length) : 72;
      scrollY = Math.max(0, (127 - center) * ROW_H - gridH() / 2);
      clampScroll();
      requestDraw();
    }
    window.addEventListener("resize", resize);
    init();
  </script>
</body>

</html>
