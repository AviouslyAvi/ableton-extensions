<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyswitch</title>
  <script>
    // Injected by the extension before the dialog opens.
    const MODE = "__MODE__"; // "apply" | "edit"
    let MAP = [/*__MAP__*/]; // Articulation[]

    const isWebKit = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;

    function doSendMessage(message) {
      if (isWebKit) window.webkit.messageHandlers.live.postMessage(message);
      else if (isWebView2) window.chrome.webview.postMessage(message);
    }
    function closeWith(result) {
      doSendMessage({ method: "close_and_send", params: [JSON.stringify(result)] });
    }
    function cancel() { closeWith({ type: "cancel" }); }

    // ---- Pitch <-> name (Live convention: C-2 = MIDI 0, C3 = 60) ----
    const NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    function pitchName(p) {
      if (p == null || isNaN(p)) return "";
      return NAMES[((p % 12) + 12) % 12] + (Math.floor(p / 12) - 2);
    }

    // ---- Apply mode: one button per articulation ----
    function applyArticulation(i) {
      const a = MAP[i];
      const hold = document.getElementById("hold").checked;
      closeWith({ type: "apply", articulation: { ...a, hold } });
    }

    // ---- Edit mode: editable rows ----
    function renderEdit() {
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      MAP.forEach((a, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="alx-input" data-i="${i}" data-k="name" value="${a.name ?? ""}" /></td>
          <td><input class="alx-input pitch" type="number" min="0" max="127" data-i="${i}" data-k="pitch" value="${a.pitch ?? 0}" /></td>
          <td class="pname">${pitchName(a.pitch)}</td>
          <td><input type="checkbox" data-i="${i}" data-k="hold" ${a.hold ? "checked" : ""} /></td>
          <td><button class="alx-button small" onclick="removeRow(${i})">✕</button></td>`;
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll("input").forEach((el) => {
        el.addEventListener("input", onEdit);
        el.addEventListener("change", onEdit);
      });
    }
    function onEdit(e) {
      const i = +e.target.dataset.i, k = e.target.dataset.k;
      if (k === "pitch") {
        MAP[i].pitch = Math.max(0, Math.min(127, +e.target.value || 0));
        e.target.closest("tr").querySelector(".pname").textContent = pitchName(MAP[i].pitch);
      } else if (k === "hold") {
        MAP[i].hold = e.target.checked;
      } else {
        MAP[i].name = e.target.value;
      }
    }
    function removeRow(i) { MAP.splice(i, 1); renderEdit(); }
    function addRow() {
      const maxPitch = MAP.reduce((m, a) => Math.max(m, a.pitch ?? 0), -1);
      MAP.push({ name: "New", pitch: Math.min(127, maxPitch + 1) });
      renderEdit();
    }
    function saveMap() { closeWith({ type: "save", map: MAP }); }

    document.addEventListener("DOMContentLoaded", () => {
      const applyView = document.getElementById("apply-view");
      const editView = document.getElementById("edit-view");
      if (MODE === "edit") {
        applyView.style.display = "none";
        editView.style.display = "flex";
        renderEdit();
      } else {
        const list = document.getElementById("art-list");
        MAP.forEach((a, i) => {
          const b = document.createElement("button");
          b.className = "alx-button art";
          b.innerHTML = `<span>${a.name}</span><span class="kbd">${pitchName(a.pitch)}</span>`;
          b.onclick = () => applyArticulation(i);
          list.appendChild(b);
        });
      }
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") cancel(); });
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    *:not(dialog) { margin: 0; }
    input, button { font: inherit; }
    :root {
      --p-live-ui-bg: hsl(0, 0%, 21%);
      --p-live-control-bg: hsl(0, 0%, 16%);
      --p-live-input-bg: hsl(0, 0%, 12%);
      --p-live-text-primary: hsl(0, 0%, 71%);
      --p-live-control-border: hsl(0, 0%, 7%);
      --p-live-text-secondary: hsl(0, 0%, 41%);
      --p-live-accent-primary: hsl(31, 100%, 67%);
      --p-live-control-text--enabled: hsl(0, 0%, 7%);
      --c-bg--0500: oklch(from var(--p-live-ui-bg) l c h);
      --c-text-primary: oklch(from var(--p-live-text-primary) l c h);
      --c-text-secondary: oklch(from var(--p-live-text-secondary) l c h);
      --c-control-bg--400: oklch(from var(--p-live-control-bg) calc(l * 0.9) c h);
      --c-control-bg--500: oklch(from var(--p-live-control-bg) l c h);
      --c-control-border: oklch(from var(--p-live-control-border) l c h);
      --c-control-outline: var(--c-text-secondary);
      --c-control-on-foreground: oklch(from var(--p-live-control-text--enabled) l c h);
      --c-input-bg-500: oklch(from var(--p-live-input-bg) l c h);
      --c-highlight--primary: oklch(from var(--p-live-accent-primary) l c h);
    }
    html {
      background-color: var(--c-bg--0500);
      color: var(--c-text-primary);
      font-family: "AbletonSansSmall", sans-serif;
      font-size: 11.5px; font-weight: 500;
      -webkit-font-smoothing: antialiased; height: 100%;
    }
    body { height: 100%; padding: 1.25em; }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75em; }
    .row { display: flex; align-items: center; gap: 0.5em; }
    .spacer { flex: 1; }
    .muted { color: var(--c-text-secondary); }

    .alx-input:not([type="checkbox"]) {
      font-size: 1rem; line-height: 1.5;
      background-color: var(--c-input-bg-500); color: var(--c-text-primary);
      border: 1px solid var(--c-control-border); height: 20px; padding: 0 0.33em; width: 100%;
    }
    .alx-input:focus { outline: 2px solid var(--c-control-outline); }
    .alx-input.pitch { width: 56px; }

    .alx-button {
      font-size: 1rem; line-height: 1;
      background-color: var(--c-control-bg--500); color: var(--c-text-primary);
      border: 1px solid var(--c-control-border); height: 20px; padding: 0 1em;
      border-radius: 1em; cursor: pointer; user-select: none; white-space: nowrap;
    }
    .alx-button:hover { background-color: var(--c-control-bg--400); }
    .alx-button:active { color: var(--c-control-on-foreground); background-color: var(--c-highlight--primary); }
    .alx-button:focus { outline: 2px solid var(--c-control-outline); }
    .alx-button.small { padding: 0 0.5em; height: 18px; }

    /* Apply view */
    #apply-view { display: flex; flex-direction: column; gap: 0.75em; }
    #art-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5em; }
    .alx-button.art {
      height: 30px; border-radius: 4px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 0.66em; text-align: left;
    }
    .alx-button.art .kbd { color: var(--c-text-secondary); font-variant-numeric: tabular-nums; }
    .alx-button.art:active .kbd { color: var(--c-control-on-foreground); }

    /* Edit view */
    #edit-view { display: none; flex-direction: column; gap: 0.75em; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--c-text-secondary); font-weight: 500; padding-bottom: 0.25em; }
    td { padding: 2px 4px 2px 0; vertical-align: middle; }
    td.pname { color: var(--c-text-secondary); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .buttons { display: flex; gap: 0.5em; justify-content: flex-end; margin-top: 0.5em; }
  </style>
</head>

<body>
  <!-- APPLY -->
  <div id="apply-view">
    <h1>Apply keyswitch</h1>
    <div id="art-list"></div>
    <label class="row"><input id="hold" type="checkbox" /> Hold for rest of clip (latch)</label>
    <div class="buttons">
      <button class="alx-button" onclick="cancel()">Cancel</button>
    </div>
  </div>

  <!-- EDIT -->
  <div id="edit-view">
    <h1>Edit keyswitch map</h1>
    <p class="muted">Re-pitch these to match your instrument's keyswitch range.</p>
    <table>
      <thead>
        <tr><th>Articulation</th><th>Pitch</th><th>Note</th><th>Hold</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="row"><button class="alx-button small" onclick="addRow()">+ Add</button></div>
    <div class="buttons">
      <button class="alx-button" onclick="cancel()">Cancel</button>
      <button class="alx-button" onclick="saveMap()">Save</button>
    </div>
  </div>
</body>

</html>
